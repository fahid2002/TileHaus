<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" width="1440" height="560">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c140d"/>
      <stop offset="50%" stop-color="#2d1e0f"/>
      <stop offset="100%" stop-color="#1a110a"/>
    </linearGradient>
    <pattern id="hgrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="rgba(200,121,65,0.06)" stroke-width="1"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="rgba(200,121,65,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="hglow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="rgba(160,82,45,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="560" fill="url(#hbg)"/>
  <rect width="1440" height="560" fill="url(#hgrid)"/>
  <rect width="1440" height="560" fill="url(#hglow)"/>

  <!-- Eyebrow text -->
  <text x="720" y="175" font-family="Georgia, serif" font-size="14" fill="#c87941"
        text-anchor="middle" letter-spacing="4" font-weight="400">
    PREMIUM TILE GALLERY · EST. 2025
  </text>

  <!-- Main headline line 1 -->
  <text x="720" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="72"
        fill="#fdf6ee" text-anchor="middle" font-weight="700" letter-spacing="-2">
    Discover Your
  </text>

  <!-- Main headline line 2 in brand color italic -->
  <text x="720" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="72"
        fill="#c87941" text-anchor="middle" font-weight="700" font-style="italic" letter-spacing="-2">
    Perfect Aesthetic
  </text>

  <!-- Subheading -->
  <text x="720" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18"
        fill="rgba(253,246,238,0.5)" text-anchor="middle" font-weight="300">
    Curated ceramic, marble &amp; mosaic tiles for inspired living spaces
  </text>

  <!-- Browse Now button -->
  <rect x="618" y="420" width="160" height="48" rx="8" fill="#a0522d"/>
  <text x="698" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15"
        fill="white" text-anchor="middle" font-weight="500">Browse Now</text>

  <!-- View Catalog button -->
  <rect x="790" y="420" width="160" height="48" rx="8" fill="none"
        stroke="rgba(253,246,238,0.3)" stroke-width="1.5"/>
  <text x="870" y="450" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15"
        fill="#fdf6ee" text-anchor="middle" font-weight="400">View Catalog</text>

  <!-- Decorative corners -->
  <rect x="60" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>
  <rect x="120" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="60" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="1270" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>
  <rect x="1330" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="1270" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="1330" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>
</svg>
