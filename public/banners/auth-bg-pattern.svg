<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <pattern id="auth-tile" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#f5f0eb"/>
      <rect x="1" y="1" width="28" height="28" fill="#faf7f3" rx="1"/>
      <rect x="31" y="1" width="28" height="28" fill="#f0ebe3" rx="1"/>
      <rect x="1" y="31" width="28" height="28" fill="#f0ebe3" rx="1"/>
      <rect x="31" y="31" width="28" height="28" fill="#faf7f3" rx="1"/>
      <!-- Subtle dot at corners -->
      <circle cx="1" cy="1" r="1" fill="rgba(160,82,45,0.1)"/>
      <circle cx="31" cy="1" r="1" fill="rgba(160,82,45,0.1)"/>
      <circle cx="1" cy="31" r="1" fill="rgba(160,82,45,0.1)"/>
      <circle cx="31" cy="31" r="1" fill="rgba(160,82,45,0.1)"/>
    </pattern>
    <radialGradient id="auth-fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(245,240,235,0.5)"/>
      <stop offset="100%" stop-color="rgba(245,240,235,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="#f8f5f1"/>
  <rect width="800" height="800" fill="url(#auth-tile)"/>
  <rect width="800" height="800" fill="url(#auth-fade)"/>
</svg>
