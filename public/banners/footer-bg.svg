<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 340" width="1440" height="340">
  <defs>
    <linearGradient id="footer-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a110a"/>
      <stop offset="100%" stop-color="#140d07"/>
    </linearGradient>
    <pattern id="footer-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(200,121,65,0.08)"/>
    </pattern>
  </defs>
  <rect width="1440" height="340" fill="url(#footer-bg)"/>
  <rect width="1440" height="340" fill="url(#footer-dots)"/>
  <!-- Top border accent -->
  <line x1="0" y1="0" x2="1440" y2="0" stroke="rgba(200,121,65,0.12)" stroke-width="1"/>
  <!-- Subtle side gradients -->
  <rect x="0" y="0" width="200" height="340" fill="url(#footer-bg)" opacity="0.3"/>
  <rect x="1240" y="0" width="200" height="340" fill="url(#footer-bg)" opacity="0.3"/>
</svg>
