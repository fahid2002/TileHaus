<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" width="1440" height="560">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c140d"/>
      <stop offset="50%" stop-color="#2d1e0f"/>
      <stop offset="100%" stop-color="#1a110a"/>
    </linearGradient>
    <!-- Tile grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="rgba(200,121,65,0.06)" stroke-width="1"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="rgba(200,121,65,0.06)" stroke-width="1"/>
    </pattern>
    <!-- Radial fade for center glow -->
    <radialGradient id="center-glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="rgba(160,82,45,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Diagonal tile accent pattern -->
    <pattern id="diag-tile" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <path d="M40 0L80 40L40 80L0 40Z" fill="rgba(160,82,45,0.04)"/>
    </pattern>
  </defs>

  <!-- Base dark bg -->
  <rect width="1440" height="560" fill="url(#hero-bg)"/>
  <!-- Grid lines -->
  <rect width="1440" height="560" fill="url(#grid)"/>
  <!-- Diagonal tile overlay -->
  <rect width="1440" height="560" fill="url(#diag-tile)"/>
  <!-- Center glow -->
  <rect width="1440" height="560" fill="url(#center-glow)"/>

  <!-- Decorative tile elements left -->
  <rect x="60" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>
  <rect x="62" y="62" width="46" height="46" rx="3" fill="none" stroke="rgba(200,121,65,0.2)" stroke-width="1"/>
  <rect x="120" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="60" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>

  <!-- Decorative tile elements right -->
  <rect x="1270" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>
  <rect x="1330" y="60" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="1270" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.08)"/>
  <rect x="1330" y="120" width="50" height="50" rx="4" fill="rgba(160,82,45,0.12)"/>

  <!-- Bottom decorative strip -->
  <rect x="0" y="540" width="1440" height="20" fill="rgba(160,82,45,0.08)"/>
  <line x1="0" y1="540" x2="1440" y2="540" stroke="rgba(200,121,65,0.15)" stroke-width="1"/>
</svg>
