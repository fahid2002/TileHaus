<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <pattern id="medallion" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#2a1f4a"/>
      <!-- Outer ring -->
      <circle cx="50" cy="50" r="42" fill="none" stroke="#5a4a8a" stroke-width="1.5"/>
      <!-- Middle ring -->
      <circle cx="50" cy="50" r="30" fill="none" stroke="#4a3a7a" stroke-width="1"/>
      <!-- Petal pattern -->
      <ellipse cx="50" cy="20" rx="8" ry="14" fill="#3a2a6a" opacity="0.7"/>
      <ellipse cx="50" cy="80" rx="8" ry="14" fill="#3a2a6a" opacity="0.7"/>
      <ellipse cx="20" cy="50" rx="14" ry="8" fill="#3a2a6a" opacity="0.7"/>
      <ellipse cx="80" cy="50" rx="14" ry="8" fill="#3a2a6a" opacity="0.7"/>
      <!-- Diagonal petals -->
      <ellipse cx="28" cy="28" rx="8" ry="14" fill="#3a2a6a" opacity="0.5" transform="rotate(45 28 28)"/>
      <ellipse cx="72" cy="28" rx="8" ry="14" fill="#3a2a6a" opacity="0.5" transform="rotate(-45 72 28)"/>
      <ellipse cx="28" cy="72" rx="8" ry="14" fill="#3a2a6a" opacity="0.5" transform="rotate(-45 28 72)"/>
      <ellipse cx="72" cy="72" rx="8" ry="14" fill="#3a2a6a" opacity="0.5" transform="rotate(45 72 72)"/>
      <!-- Center -->
      <circle cx="50" cy="50" r="10" fill="#5a4a8a"/>
      <circle cx="50" cy="50" r="5" fill="#7a6aae"/>
    </pattern>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(120,100,180,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#medallion)"/>
  <rect width="600" height="600" fill="url(#mg)"/>
</svg>
