<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <pattern id="mosaic" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1e3a2e"/>
      <!-- Checkerboard mosaic -->
      <rect x="1" y="1" width="18" height="18" fill="#2d5a42" rx="1"/>
      <rect x="21" y="1" width="18" height="18" fill="#3a6b4f" rx="1"/>
      <rect x="1" y="21" width="18" height="18" fill="#3a6b4f" rx="1"/>
      <rect x="21" y="21" width="18" height="18" fill="#2d5a42" rx="1"/>
      <!-- Highlight on top-left of each tile -->
      <rect x="1" y="1" width="5" height="2" fill="rgba(255,255,255,0.12)" rx="0.5"/>
      <rect x="21" y="1" width="5" height="2" fill="rgba(255,255,255,0.12)" rx="0.5"/>
      <rect x="1" y="21" width="5" height="2" fill="rgba(255,255,255,0.12)" rx="0.5"/>
      <rect x="21" y="21" width="5" height="2" fill="rgba(255,255,255,0.12)" rx="0.5"/>
    </pattern>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#mosaic)"/>
  <rect width="600" height="600" fill="url(#dg)"/>
</svg>
