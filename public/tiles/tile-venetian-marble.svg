<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <pattern id="marble" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#ece8e1"/>
      <!-- Marble veins -->
      <path d="M0 30 Q30 20 60 40 Q90 55 120 35" stroke="#c8bfb0" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M0 70 Q25 60 50 80 Q80 95 120 75" stroke="#b8b0a0" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M20 0 Q35 30 25 60 Q15 90 30 120" stroke="#d0c8b8" stroke-width="0.8" fill="none" opacity="0.5"/>
      <path d="M80 0 Q95 40 85 80 Q75 110 90 120" stroke="#c0b8a8" stroke-width="1.2" fill="none" opacity="0.35"/>
      <path d="M0 50 Q40 45 70 55 Q100 65 120 55" stroke="#d8d0c0" stroke-width="0.6" fill="none" opacity="0.3"/>
    </pattern>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#marble)"/>
  <rect width="600" height="600" fill="url(#gloss)"/>
  <!-- Grout lines -->
  <line x1="0" y1="120" x2="600" y2="120" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="0" y1="360" x2="600" y2="360" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="0" y1="480" x2="600" y2="480" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="120" y1="0" x2="120" y2="600" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="240" y1="0" x2="240" y2="600" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="360" y1="0" x2="360" y2="600" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
  <line x1="480" y1="0" x2="480" y2="600" stroke="rgba(200,190,180,0.5)" stroke-width="2"/>
</svg>
